<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#0f0f14"/>
    </linearGradient>
    <linearGradient id="die" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b80ff"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Die cube rotated 12deg around its center for a 3D feel. -->
  <g transform="rotate(-12 256 256)">
    <rect x="156" y="156" width="200" height="200" rx="32" ry="32"
          fill="url(#die)" stroke="#5b3fd9" stroke-width="4"/>
    <!-- Five-pip face: centers and one in the middle. -->
    <circle cx="206" cy="206" r="18" fill="#1a1a24"/>
    <circle cx="306" cy="206" r="18" fill="#1a1a24"/>
    <circle cx="256" cy="256" r="18" fill="#1a1a24"/>
    <circle cx="206" cy="306" r="18" fill="#1a1a24"/>
    <circle cx="306" cy="306" r="18" fill="#1a1a24"/>
  </g>
</svg>
