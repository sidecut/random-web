<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f14" />
    <link rel="manifest" href="manifest.json" />
    <title>Random Web</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="alternate icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-512.png" />
    <style>
      :root {
        --bg: #0f0f14;
        --surface: #1a1a24;
        --surface-hover: #242438;
        --text: #e8e8f0;
        --text-muted: #8888a0;
        --accent: #7c5cfc;
        --accent-glow: rgba(124, 92, 252, 0.35);
        --danger: #fc5c7d;
        --success: #5cfc9b;
        --radius: 14px;
        --radius-sm: 10px;
        --font: "Inter", "SF Pro", system-ui, -apple-system, sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 16px;
        padding-top: max(40px, 10vh);
      }

      .app {
        width: 100%;
        max-width: 480px;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }
      .header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .header p {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 4px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .tab-btn {
        flex: 1;
        padding: 10px 0;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tab-btn.active {
        background: var(--surface-hover);
        color: var(--text);
        border-color: var(--accent);
        box-shadow: 0 0 12px var(--accent-glow);
      }
      .tab-btn:hover:not(.active) {
        color: var(--text);
      }

      /* Card */
      .card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 24px;
      }

      /* Panels */
      /* Visibility controlled by Alpine x-show on each .tab-panel. */

      /* Fields */
      .fields {
        display: flex;
        gap: 12px;
        margin-bottom: 8px;
      }
      .field {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .field label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius-sm);
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.95rem;
        transition: border-color 0.2s;
      }
      .field input:focus {
        outline: none;
        border-color: var(--accent);
      }

      /* Buttons */
      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 12px;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 4px 16px var(--accent-glow);
      }
      .btn-secondary {
        background: var(--surface-hover);
        color: var(--text);
        border: 1px solid #2a2a3a;
      }
      .btn-secondary:hover {
        border-color: var(--accent);
      }
      .btn:active {
        transform: scale(0.98);
      }

      /* Result display */
      .result-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        min-height: 80px;
        justify-content: center;
      }
      .numbers-result-area {
        margin-top: 16px;
      }
      .result-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
      }
      .result-value {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        transition: transform 0.15s ease;
      }
      .result-value.pop {
        animation: pop 0.35s ease-out;
      }
      .result-value.shuffle {
        font-size: 2rem;
        line-height: 1.3;
      }
      .result-range {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .copy-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .copy-btn.copied {
        color: var(--success);
        border-color: var(--success);
      }
      .copy-btn:disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }
      @keyframes pop {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.15);
        }
        60% {
          transform: scale(0.95);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Coin */
      .coin-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 160px;
      }
      .coin {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f5d76e, #e6b800);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        font-size: 2rem;
        font-weight: 700;
        color: #8b7300;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
        transition: transform 0.1s;
      }
      .coin-face {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        display: block;
      }
      .coin.flip {
        animation: coin-flip 0.16s linear;
      }
      .coin-result {
        font-family: var(--font-mono);
        font-size: 2rem;
        font-weight: 700;
        margin-top: 12px;
        text-align: center;
        min-height: 40px;
      }
      .coin-result.heads {
        color: var(--accent);
      }
      .coin-result.tails {
        color: var(--danger);
      }

      @keyframes coin-flip {
        0% {
          transform: translateY(0) scaleY(1);
        }
        50% {
          transform: translateY(-26px) scaleY(0.08);
        }
        100% {
          transform: translateY(0) scaleY(1);
        }
      }

      /* Stats */
      .stats-row {
        display: flex;
        gap: 12px;
        text-align: center;
      }
      .stat {
        flex: 1;
        background: var(--bg);
        border-radius: var(--radius-sm);
        padding: 12px 8px;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1.25rem;
        font-weight: 700;
      }
      .stat-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Reset button */
      .reset-link {
        background: none;
        border: none;
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.8rem;
        cursor: pointer;
        text-align: center;
        padding: 4px;
        transition: color 0.2s;
      }
      .reset-link:hover {
        color: var(--danger);
      }

      /* Error */
      .error-msg {
        color: var(--danger);
        font-size: 0.85rem;
        min-height: 20px;
      }

      /* Diagnostic */
      .diag-section {
        border-top: 1px solid #2a2a3a;
        padding-top: 16px;
        margin-top: 4px;
      }
      .diag-btn {
        width: 100%;
        padding: 10px;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius-sm);
        background: var(--bg);
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .diag-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .diag-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .diag-output {
        margin-top: 12px;
        background: var(--bg);
        border-radius: var(--radius-sm);
        padding: 14px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        line-height: 1.6;
        max-height: 300px;
        overflow-y: auto;
        display: none;
        white-space: pre-wrap;
      }
      .diag-output.visible {
        display: block;
      }

      /* Desktop */
      @media (min-width: 540px) {
        body {
          padding: 32px;
          padding-top: max(64px, 12vh);
        }
        .header h1 {
          font-size: 2rem;
        }
        .card {
          padding: 32px;
        }
        .fields {
          flex-wrap: nowrap;
        }
        .coin {
          width: 140px;
          height: 140px;
        }
        .result-value {
          font-size: 5rem;
        }
        .result-value.shuffle {
          font-size: 2.5rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .result-value.pop,
        .coin.flip {
          animation: none;
        }
      }
    </style>
    <link rel="preload" href="coin-heads.png" as="image" />
    <link rel="preload" href="coin-tails.png" as="image" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div class="app" x-data="app">
      <header class="header">
        <h1>Random Web</h1>
        <p>Cryptographically secure randomness in your browser</p>
      </header>

      <nav class="tabs" role="tablist" aria-label="Randomizer">
        <button
          class="tab-btn"
          :class="{ active: activeTab === 'numbers' }"
          role="tab"
          :aria-selected="activeTab === 'numbers'"
          aria-controls="panel-numbers"
          @click="switchTab('numbers')"
        >
          🎲 Numbers
        </button>
        <button
          class="tab-btn"
          :class="{ active: activeTab === 'coin' }"
          role="tab"
          :aria-selected="activeTab === 'coin'"
          aria-controls="panel-coin"
          @click="switchTab('coin')"
        >
          🪙 Coin Toss
        </button>
      </nav>

      <!-- Numbers panel -->
      <div class="card">
        <div
          class="tab-panel"
          id="panel-numbers"
          role="tabpanel"
          x-data="numbersPanel"
          x-show="activeTab === 'numbers'"
        >
          <div class="fields">
            <div class="field">
              <label for="min">Min</label>
              <input
                type="number"
                id="min"
                x-model.number="min"
                min="0"
                :max="MAX_RANGE_DIFF"
                inputmode="numeric"
                @change="persistBounds"
                @keydown.enter.prevent="persistBounds(); generateNumber()"
              />
            </div>
            <div class="field">
              <label for="max">Max</label>
              <input
                type="number"
                id="max"
                x-model.number="max"
                min="1"
                :max="MAX_RANGE_DIFF"
                inputmode="numeric"
                @change="persistBounds"
                @keydown.enter.prevent="persistBounds(); generateNumber()"
              />
            </div>
          </div>

          <div class="error-msg" x-show="error" x-text="error"></div>

          <button class="btn btn-primary" @click="generateNumber">
            Generate Number
          </button>

          <button class="btn btn-secondary" @click="shuffleRange">
            🔀 Shuffle Range
          </button>

          <div class="result-area numbers-result-area">
            <span class="result-label" id="numbers-result-label">Last result</span>
            <button
              class="copy-btn"
              :class="copyBtnClass"
              :disabled="!hasResult"
              aria-label="Copy result to clipboard"
              @click="copy"
              x-text="copyBtnLabel"
            ></button>
            <span
              class="result-value"
              :class="{ pop: showPop, shuffle: showShuffle }"
              role="status"
              aria-live="polite"
              aria-atomic="true"
              aria-labelledby="numbers-result-label"
              x-text="lastResult"
            ></span>
            <span class="result-range" x-text="resultRange"></span>
          </div>

          <div class="diag-section" x-data="diagnostic">
            <button
              class="diag-btn"
              :disabled="diagRunning"
              @click="runDiagnostic"
              x-text="diagBtnLabel"
            ></button>
            <div
              class="diag-output"
              :class="{ visible: showDiag }"
              role="status"
              aria-live="polite"
              aria-atomic="true"
              x-text="diagText"
            ></div>
          </div>
        </div>

        <!-- Coin panel -->
        <div
          class="tab-panel"
          id="panel-coin"
          role="tabpanel"
          x-data="coinPanel"
          x-show="activeTab === 'coin'"
        >
          <button class="btn btn-primary" @click="tossCoin">Toss Coin</button>

          <div class="coin-container">
            <div class="coin" x-ref="coinDisplay">
              <img
                class="coin-face"
                x-ref="coinFace"
                src=""
                alt=""
                hidden
              />
              <span
                x-ref="coinPlaceholder"
                style="
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%);
                "
                >?</span
              >
            </div>
          </div>
          <div
            class="coin-result"
            :class="coinResultClass"
            role="status"
            aria-live="assertive"
            aria-atomic="true"
            x-text="coinResultText"
          ></div>

          <div class="stats-row">
            <div class="stat">
              <div class="stat-value" x-text="coinStats.heads"></div>
              <div class="stat-label">Heads</div>
            </div>
            <div class="stat">
              <div class="stat-value" x-text="coinStats.tails"></div>
              <div class="stat-label">Tails</div>
            </div>
            <div class="stat">
              <div
                class="stat-value"
                x-text="coinStats.heads + coinStats.tails"
              ></div>
              <div class="stat-label">Total</div>
            </div>
          </div>

          <button class="reset-link" @click="resetCoinStats">
            Clear stats
          </button>
        </div>
      </div>
    </div>

    <script>
      // ── CSPRNG ──────────────────────────────────────────────
      // secureRandomInt returns a uniform integer in [min, max] (inclusive).
      // `range` is the count of distinct outputs (max - min + 1). The algorithm
      // is correct for any range that fits in 32 bits, since rejection sampling
      // is over a Uint32. JS Number is a 64-bit float, so callers must keep
      // `range <= 2^32` — values larger than ~4.29B are silently inaccurate.
      // The UI caps inputs at 1,000,000, well below the limit.
      const UINT32_MAX = 0xffffffff;
      const MAX_RANGE = 2 ** 32;

      // Largest allowed (max - min) for the user-facing inputs. Kept well under
      // MAX_RANGE so rejection-sampling stays cheap and the shuffleRange array
      // never exceeds available memory. Used by both the HTML max= bindings
      // (rendered into the template via :max) and validateBounds().
      const MAX_RANGE_DIFF = 1_000_000;

      function secureRandomInt(min, max) {
        if (min > max) throw new RangeError("min must be <= max");
        const range = max - min + 1;
        if (range > MAX_RANGE) {
          throw new RangeError(
            `range ${range} exceeds 2^32; secureRandomInt cannot be unbiased`,
          );
        }
        if (!Number.isSafeInteger(min) || !Number.isSafeInteger(max)) {
          throw new RangeError("min and max must be safe integers");
        }
        const maxValid = UINT32_MAX - (UINT32_MAX % range);
        const buf = new Uint32Array(1);
        let val;
        do {
          crypto.getRandomValues(buf);
          val = buf[0];
        } while (val >= maxValid);
        return min + (val % range);
      }

      function secureRandomBoolean() {
        const buf = new Uint8Array(1);
        crypto.getRandomValues(buf);
        return (buf[0] & 1) === 0;
      }

      // ── localStorage helpers ────────────────────────────────
      const LS_KEY = "random-web-prefs";
      const PREF_DEFAULTS = {
        min: 1,
        max: 100,
        tab: "numbers",
        coinStats: { heads: 0, tails: 0 },
      };
      function getPrefs() {
        let stored = {};
        try {
          const raw = localStorage.getItem(LS_KEY);
          if (raw) stored = JSON.parse(raw);
        } catch (_) {}
        return {
          min: typeof stored.min === "number" ? stored.min : PREF_DEFAULTS.min,
          max: typeof stored.max === "number" ? stored.max : PREF_DEFAULTS.max,
          tab: typeof stored.tab === "string" ? stored.tab : PREF_DEFAULTS.tab,
          coinStats:
            stored.coinStats && typeof stored.coinStats === "object"
              ? { ...PREF_DEFAULTS.coinStats, ...stored.coinStats }
              : { ...PREF_DEFAULTS.coinStats },
        };
      }
      function updatePrefs(patch) {
        try {
          const raw = localStorage.getItem(LS_KEY);
          const current = raw ? JSON.parse(raw) : {};
          localStorage.setItem(
            LS_KEY,
            JSON.stringify({ ...current, ...patch }),
          );
        } catch (_) {}
      }

      // ── Fisher-Yates shuffle ────────────────────────────────
      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = secureRandomInt(0, i);
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ── Fairness analysis helpers ───────────────────────────
      // (analyzeDistribution and analyzeStreaks were removed when the
      // diagnostic loop was chunked; counts and streaks are now built
      // incrementally alongside each value to avoid a second pass.)

      // ── Alpine component ────────────────────────────────────
      const FLIP_MS = 160;

      document.addEventListener("alpine:init", () => {
        Alpine.data("app", () => ({
          activeTab: "numbers",

          init() {
            const prefs = getPrefs();
            this.activeTab = prefs.tab;
            this.$watch("activeTab", () => this.persistTab());
          },

          switchTab(tab) {
            this.activeTab = tab;
          },

          persistTab() {
            updatePrefs({ tab: this.activeTab });
          },
        }));

        Alpine.data("numbersPanel", () => ({
          min: 1,
          max: 100,
          lastResult: "—",
          hasResult: false,
          error: "",
          showPop: false,
          showShuffle: false,
          resultRange: "",
          copyBtnLabel: "📋 Copy",
          copyBtnClass: "",

          init() {
            const prefs = getPrefs();
            this.min = prefs.min;
            this.max = prefs.max;
            this.$watch("min", () => this.persistBounds());
            this.$watch("max", () => this.persistBounds());
          },

          // ── Validation ────────────────────────────────────
          validateBounds() {
            if (isNaN(this.min) || isNaN(this.max))
              return "Please enter numbers for both bounds.";
            if (this.min > this.max)
              return "Min must be less than or equal to Max.";
            if (this.max - this.min > MAX_RANGE_DIFF)
              return `Range too large. Max difference is ${MAX_RANGE_DIFF.toLocaleString()}.`;
            return null;
          },

          // ── Formatting ────────────────────────────────────
          // Single source of truth for the "1 – 100" / "1 – 100 (50 items)"
          // label. Pass count to append an item tally; omit for a plain range.
          formatRange(count) {
            const base = `${this.min} – ${this.max}`;
            if (count == null) return base;
            return `${base}  (${count.toLocaleString()} items)`;
          },

          // ── Number generation ─────────────────────────────
          generateNumber() {
            const err = this.validateBounds();
            this.error = err || "";
            if (err) return;

            try {
              const result = secureRandomInt(this.min, this.max);
              this.lastResult = String(result);
              this.hasResult = true;
              this.resultRange = this.formatRange();
              this.error = "";
              // Trigger pop animation via flag reset
              this.showPop = false;
              this.showShuffle = false;
              this.$nextTick(() => {
                this.showPop = true;
              });
            } catch (e) {
              this.error = e.message;
            }
          },

          // ── Shuffle ───────────────────────────────────────
          shuffleRange() {
            const err = this.validateBounds();
            this.error = err || "";
            if (err) return;

            const range = this.max - this.min + 1;
            const values = new Array(range);
            for (let v = this.min; v <= this.max; v++) values[v - this.min] = v;

            const shuffled = shuffleArray(values);

            const DISPLAY_CAP = 1000;
            let display;
            if (shuffled.length <= DISPLAY_CAP) {
              display = shuffled.join(" ");
            } else {
              const head = shuffled.slice(0, 20);
              const tail = shuffled.slice(-20);
              display = head.join(" ") + " ... " + tail.join(" ");
            }

            this.lastResult = display;
            this.hasResult = true;
            // showShuffle is a sticky class — it stays true so the result
            // element keeps the smaller shuffle font size. The "pop" animation
            // is the one we re-fire each time, via showPop flag toggle.
            this.showShuffle = true;
            this.resultRange = this.formatRange(range);
            this.error = "";
            this.showPop = false;
            this.$nextTick(() => {
              this.showPop = true;
            });
          },

          // ── Persistence ───────────────────────────────────
          persistBounds() {
            updatePrefs({ min: this.min, max: this.max });
          },

          // ── Copy ──────────────────────────────────────────
          // The button is :disabled="!hasResult" so this guard is a
          // belt-and-suspenders fallback for keyboard / programmatic
          // invocation. Silently no-op is intentional: the button
          // already gives the user a visible affordance for state.
          async copy() {
            const text = this.lastResult;
            if (!text || text === "—") return;
            try {
              await navigator.clipboard.writeText(text);
              this.copyBtnLabel = "✓ Copied!";
              this.copyBtnClass = "copied";
              setTimeout(() => {
                this.copyBtnLabel = "📋 Copy";
                this.copyBtnClass = "";
              }, 1500);
            } catch {
              this.copyBtnLabel = "⚠ Failed";
              setTimeout(() => {
                this.copyBtnLabel = "📋 Copy";
              }, 1500);
            }
          },
        }));

        Alpine.data("diagnostic", () => ({
          diagRunning: false,
          diagBtnLabel: "🔬 Verify Fairness (browser CSPRNG)",
          showDiag: false,
          diagText: "",

          runDiagnostic() {
            const err = this.validateBounds();
            if (err) {
              this.error = err;
              return;
            }

            const N = 100_000;
            const CHUNK = 10_000;
            const min = this.min;
            const max = this.max;
            this.diagRunning = true;
            this.diagBtnLabel = `Running ${N.toLocaleString()} iterations...`;
            this.showDiag = false;

            // Chunk the CSPRNG calls so the UI thread stays responsive
            // between chunks. Each chunk is small enough that the worst-case
            // jank on a slow device is well under one frame's budget.
            setTimeout(() => {
              const start = performance.now();
              const values = new Array(N);
              const counts = new Map();
              const streaks = {};
              let prevValue = null;
              let runLen = 0;

              const processChunk = (startIdx) => {
                const end = Math.min(startIdx + CHUNK, N);
                for (let j = startIdx; j < end; j++) {
                  const v = secureRandomInt(min, max);
                  values[j] = v;
                  counts.set(v, (counts.get(v) || 0) + 1);

                  if (prevValue === v) {
                    runLen++;
                  } else {
                    if (runLen >= 2) streaks[runLen] = (streaks[runLen] || 0) + 1;
                    prevValue = v;
                    runLen = 1;
                  }
                }

                if (end < N) {
                  // Yield to the browser, then resume.
                  setTimeout(() => processChunk(end), 0);
                  return;
                }

                // Finalize: flush the trailing run and build the report.
                if (runLen >= 2) streaks[runLen] = (streaks[runLen] || 0) + 1;
                const elapsed = ((performance.now() - start) / 1000).toFixed(2);

                const range = max - min + 1;
                const expected = N / range;
                const lines = [];

                if (range <= 20) {
                  lines.push("Distribution:");
                  for (let v = min; v <= max; v++) {
                    const c = counts.get(v) || 0;
                    const pct = ((c / N) * 100).toFixed(3);
                    const delta = (((c - expected) / expected) * 100).toFixed(2);
                    lines.push(
                      `  ${v}: ${c.toLocaleString()} (${pct}%) ${delta}%`,
                    );
                  }
                } else {
                  lines.push(
                    `Distribution: ${range} values, expected ~${expected.toFixed(0)} each`,
                  );
                }

                lines.push("\nStreak lengths (observed vs expected):");
                const pSame = 1 / range;
                const windows = N - 1;
                for (let len = 2; len <= 8; len++) {
                  const obs = streaks[len] || 0;
                  const expStreak =
                    windows * Math.pow(pSame, len - 1) * (1 - pSame);
                  if (expStreak < 0.5 && obs === 0) continue;
                  lines.push(
                    `  Len ${len}: ${obs.toLocaleString()} (expected ~${expStreak.toFixed(1)})`,
                  );
                }

                lines.push(
                  `\nGenerated: ${N.toLocaleString()} values in ${elapsed}s`,
                );
                lines.push(
                  "Source: crypto.getRandomValues() — your browser CSPRNG",
                );

                this.diagText = lines.join("\n");
                this.showDiag = true;
                this.diagRunning = false;
                this.diagBtnLabel = "🔬 Verify Fairness (browser CSPRNG)";
              };

              processChunk(0);
            }, 50);
          },
        }));

        Alpine.data("coinPanel", () => ({
          coinStats: { heads: 0, tails: 0 },
          coinResultText: "",
          coinResultClass: "coin-result",
          coinFlipping: false,

          init() {
            const prefs = getPrefs();
            this.coinStats = { ...prefs.coinStats };
          },

          // ── Coin toss ─────────────────────────────────────
          showCoinFace(isHeads) {
            this.$refs.coinPlaceholder.hidden = true;
            const img = this.$refs.coinFace;
            img.src = isHeads ? "coin-heads.png" : "coin-tails.png";
            img.alt = isHeads ? "Heads" : "Tails";
            img.hidden = false;
          },

          settleCoin(isHeads) {
            const el = this.$refs.coinDisplay;
            el.classList.remove("flip");
            // Force the final displayed face to match the CSPRNG result,
            // regardless of how many visual flips ran.
            this.showCoinFace(isHeads);
            this.coinResultText = isHeads ? "Heads" : "Tails";
            this.coinResultClass = `coin-result ${isHeads ? "heads" : "tails"}`;
            const next = { ...this.coinStats };
            next[isHeads ? "heads" : "tails"]++;
            this.coinStats = next;
            this.saveCoinStats();
            this.coinFlipping = false;
          },

          tossCoin() {
            if (this.coinFlipping) return;
            this.coinResultText = "";
            this.coinResultClass = "coin-result";

            const isHeads = secureRandomBoolean();

            const reduceMotion =
              window.matchMedia &&
              window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            if (reduceMotion) {
              this.showCoinFace(isHeads);
              this.settleCoin(isHeads);
              return;
            }

            // Visual flip count is purely cosmetic — settleCoin() forces the
            // final face to the CSPRNG result, so no parity correction needed.
            const flips = 3 + Math.floor(Math.random() * 3);

            this.coinFlipping = true;
            let showingHeads = true;
            this.showCoinFace(showingHeads);

            const self = this;
            let done = 0;
            function doFlip() {
              const el = self.$refs.coinDisplay;
              el.classList.remove("flip");
              void el.offsetWidth;
              el.classList.add("flip");
              setTimeout(() => {
                showingHeads = !showingHeads;
                self.showCoinFace(showingHeads);
              }, FLIP_MS / 2);

              done++;
              if (done < flips) {
                setTimeout(doFlip, FLIP_MS);
              } else {
                setTimeout(() => self.settleCoin(isHeads), FLIP_MS);
              }
            }
            doFlip();
          },

          // ── Coin stats ────────────────────────────────────
          saveCoinStats() {
            updatePrefs({ coinStats: this.coinStats });
          },

          resetCoinStats() {
            this.coinStats = { heads: 0, tails: 0 };
            this.saveCoinStats();
            const img = this.$refs.coinFace;
            img.hidden = true;
            img.src = "";
            this.$refs.coinPlaceholder.hidden = false;
            this.coinResultText = "";
            this.coinResultClass = "coin-result";
          },
        }));
      });

      // ── Service worker ─────────────────────────────────────
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
