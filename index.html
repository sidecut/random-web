<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Web</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface-hover: #242438;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.35);
      --danger: #fc5c7d;
      --success: #5cfc9b;
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Inter", "SF Pro", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Header */
    .header {
      text-align: center;
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: calc(var(--radius) - 4px);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .tab-btn.active {
      background: var(--surface-hover);
      color: var(--text);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 20px; }

    /* Form */
    .fields {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .field {
      flex: 1;
      min-width: 80px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      font-weight: 600;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #2a2a3a;
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }
    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .field input:focus {
      border-color: var(--accent);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #9178ff;
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-secondary {
      background: var(--surface-hover);
      color: var(--text);
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #2e2e48;
      box-shadow: 0 0 16px rgba(124, 92, 252, 0.15);
    }
    .btn-secondary:active {
      transform: scale(0.98);
    }

    /* Result display */
    .result-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-height: 80px;
      justify-content: center;
    }
    .result-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .result-value {
      font-family: var(--font-mono);
      font-size: 4rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      transition: transform 0.15s ease;
    }
    .result-value.pop {
      animation: pop 0.35s ease-out;
    }
    .result-range {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .result-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid #2a2a3a;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .copy-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }
    .copy-btn.copied {
      color: var(--success);
      border-color: var(--success);
    }
    .copy-btn:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.15); }
      60%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    /* Coin */
    .coin-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
    }
    .coin {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5d76e, #e6b800);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #8b7300;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.3);
      transition: transform 0.1s;
    }
    .coin.spinning {
      animation: spin 0.8s ease-out;
    }
    .coin-result {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      margin-top: 12px;
      text-align: center;
      min-height: 40px;
    }
    .coin-result.heads { color: var(--accent); }
    .coin-result.tails { color: var(--danger); }

    @keyframes spin {
      0%   { transform: rotateY(0) scale(1); }
      25%  { transform: rotateY(180deg) scale(1.08); }
      50%  { transform: rotateY(360deg) scale(0.95); }
      75%  { transform: rotateY(540deg) scale(1.04); }
      100% { transform: rotateY(720deg) scale(1); }
    }

    /* Stats */
    .stats-row {
      display: flex;
      gap: 12px;
      text-align: center;
    }
    .stat {
      flex: 1;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Reset button */
    .reset-link {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      padding: 4px;
      transition: color 0.2s;
    }
    .reset-link:hover {
      color: var(--danger);
    }

    /* Error */
    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      min-height: 20px;
    }

    /* Diagnostic */
    .diag-section {
      border-top: 1px solid #2a2a3a;
      padding-top: 16px;
      margin-top: 4px;
    }
    .diag-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid #2a2a3a;
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diag-btn:hover { color: var(--text); border-color: var(--accent); }
    .diag-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .diag-output {
      margin-top: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
    }
    .diag-output.visible { display: block; }

    /* Desktop */
    @media (min-width: 540px) {
      body { padding: 32px; }
      .header h1 { font-size: 2rem; }
      .card { padding: 32px; }
      .fields { flex-wrap: nowrap; }
      .coin { width: 140px; height: 140px; font-size: 2.5rem; }
      .result-value { font-size: 5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .result-value.pop,
      .coin.spinning { animation: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Random Web</h1>
      <p>Cryptographically secure randomness in your browser</p>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="numbers" id="tab-numbers">🎲 Numbers</button>
      <button class="tab-btn" data-tab="coin" id="tab-coin">🪙 Coin Toss</button>
    </nav>

    <!-- Numbers panel -->
    <div class="card">
      <div class="tab-panel active" id="panel-numbers">
        <div class="fields">
          <div class="field">
            <label for="min">Min</label>
            <input type="number" id="min" value="1" min="0" max="1000000" inputmode="numeric">
          </div>
          <div class="field">
            <label for="max">Max</label>
            <input type="number" id="max" value="100" min="1" max="1000000" inputmode="numeric">
          </div>
        </div>

        <div class="error-msg" id="num-error"></div>

        <button class="btn btn-primary" id="generate-btn">
          Generate Number
        </button>

        <button class="btn btn-secondary" id="shuffle-btn">
          🔀 Shuffle Range
        </button>

        <div class="result-area" id="num-result-area">
          <span class="result-label">Last result</span>
          <div class="result-row">
            <span class="result-value" id="num-result">—</span>
            <button class="copy-btn" id="copy-btn" disabled>📋 Copy</button>
          </div>
          <span class="result-range" id="num-range"></span>
        </div>

        <div class="diag-section">
          <button class="diag-btn" id="verify-btn">🔬 Verify Fairness (browser CSPRNG)</button>
          <div class="diag-output" id="diag-output"></div>
        </div>
      </div>

      <!-- Coin panel -->
      <div class="tab-panel" id="panel-coin">
        <button class="btn btn-primary" id="toss-btn">
          Toss Coin
        </button>

        <div class="coin-container">
          <div class="coin" id="coin-display">?</div>
        </div>
        <div class="coin-result" id="coin-result-text"></div>

        <div class="stats-row">
          <div class="stat">
            <div class="stat-value" id="heads-count">0</div>
            <div class="stat-label">Heads</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="tails-count">0</div>
            <div class="stat-label">Tails</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="toss-total">0</div>
            <div class="stat-label">Total</div>
          </div>
        </div>

        <button class="reset-link" id="reset-coin-stats">Clear stats</button>
      </div>
    </div>
  </div>

  <script>
    // ── CSPRNG ──────────────────────────────────────────────
    function secureRandomInt(min, max) {
      if (min > max) throw new RangeError("min must be <= max");
      const range = max - min + 1;
      const maxUint32 = 0xFFFFFFFF;
      const maxValid = maxUint32 - (maxUint32 % range);
      const buf = new Uint32Array(1);
      let val;
      do {
        crypto.getRandomValues(buf);
        val = buf[0];
      } while (val >= maxValid);
      return min + (val % range);
    }

    function secureRandomBoolean() {
      const buf = new Uint8Array(1);
      crypto.getRandomValues(buf);
      return (buf[0] & 1) === 0; // even = heads
    }

    // ── localStorage helpers ────────────────────────────────
    const LS_KEY = "random-web-prefs";
    function loadPrefs() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return {};
        return JSON.parse(raw);
      } catch (e) {
        return {};
      }
    }
    function savePrefs(prefs) {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(prefs));
      } catch (e) {
        // quota exceeded or storage unavailable — silently ignore
      }
    }

    // ── DOM refs ────────────────────────────────────────────
    const tabNumbers = document.getElementById("tab-numbers");
    const tabCoin = document.getElementById("tab-coin");
    const panelNumbers = document.getElementById("panel-numbers");
    const panelCoin = document.getElementById("panel-coin");
    const minInput = document.getElementById("min");
    const maxInput = document.getElementById("max");
    const generateBtn = document.getElementById("generate-btn");
    const shuffleBtn = document.getElementById("shuffle-btn");
    const numResult = document.getElementById("num-result");
    const numRange = document.getElementById("num-range");
    const numError = document.getElementById("num-error");
    const copyBtn = document.getElementById("copy-btn");
    const tossBtn = document.getElementById("toss-btn");
    const coinDisplay = document.getElementById("coin-display");
    const coinResultText = document.getElementById("coin-result-text");
    const headsCount = document.getElementById("heads-count");
    const tailsCount = document.getElementById("tails-count");
    const tossTotal = document.getElementById("toss-total");
    const resetCoinStats = document.getElementById("reset-coin-stats");

    // ── Tab switching ───────────────────────────────────────
    function switchTab(tab) {
      const isNumbers = tab === "numbers";
      tabNumbers.classList.toggle("active", isNumbers);
      tabCoin.classList.toggle("active", !isNumbers);
      panelNumbers.classList.toggle("active", isNumbers);
      panelCoin.classList.toggle("active", !isNumbers);
    }
    tabNumbers.addEventListener("click", () => switchTab("numbers"));
    tabCoin.addEventListener("click", () => switchTab("coin"));

    // ── Number generation ───────────────────────────────────
    let lastNumResult = null;

    function validateBounds() {
      const min = parseInt(minInput.value, 10);
      const max = parseInt(maxInput.value, 10);
      if (isNaN(min) || isNaN(max)) return "Please enter numbers for both bounds.";
      if (min > max) return "Min must be less than or equal to Max.";
      if (max - min > 1_000_000) return "Range too large. Max difference is 1,000,000.";
      return null;
    }

    function generateNumber() {
      const error = validateBounds();
      numError.textContent = error || "";
      if (error) return;

      const min = parseInt(minInput.value, 10);
      const max = parseInt(maxInput.value, 10);
      try {
        const result = secureRandomInt(min, max);
        lastNumResult = result;
        numResult.textContent = result;
        numResult.classList.remove("pop");
        void numResult.offsetWidth; // reflow
        numResult.classList.add("pop");
        numRange.textContent = `${min} – ${max}`;
        numError.textContent = "";
        copyBtn.disabled = false;
        copyBtn.textContent = "📋 Copy";
        copyBtn.classList.remove("copied");
      } catch (e) {
        numError.textContent = e.message;
      }
    }

    copyBtn.addEventListener("click", async () => {
      const text = numResult.textContent;
      if (!text || text === "—") return;
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = "✓ Copied!";
        copyBtn.classList.add("copied");
        setTimeout(() => {
          copyBtn.textContent = "📋 Copy";
          copyBtn.classList.remove("copied");
        }, 1500);
      } catch {
        copyBtn.textContent = "⚠ Failed";
        setTimeout(() => {
          copyBtn.textContent = "📋 Copy";
        }, 1500);
      }
    });

    function persistBounds() {
      const min = parseInt(minInput.value, 10);
      const max = parseInt(maxInput.value, 10);
      savePrefs({ ...loadPrefs(), min, max });
    }

    function shuffleArray(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = secureRandomInt(0, i);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffleRange() {
      const error = validateBounds();
      numError.textContent = error || "";
      if (error) return;

      const min = parseInt(minInput.value, 10);
      const max = parseInt(maxInput.value, 10);
      const range = max - min + 1;

      const values = new Array(range);
      for (let v = min; v <= max; v++) values[v - min] = v;

      const shuffled = shuffleArray(values);

      const DISPLAY_CAP = 1000;
      let display;
      if (shuffled.length <= DISPLAY_CAP) {
        display = shuffled.join(" ");
      } else {
        const head = shuffled.slice(0, 20);
        const tail = shuffled.slice(-20);
        display = head.join(" ") + " ... " + tail.join(" ");
      }

      numResult.textContent = display;
      numResult.classList.remove("pop");
      void numResult.offsetWidth;
      numResult.classList.add("pop");
      numRange.textContent = `${min} – ${max}  (${range.toLocaleString()} items)`;
      numError.textContent = "";
      copyBtn.disabled = false;
      copyBtn.textContent = "📋 Copy";
      copyBtn.classList.remove("copied");
    }

    generateBtn.addEventListener("click", generateNumber);
    shuffleBtn.addEventListener("click", shuffleRange);

    [minInput, maxInput].forEach((el) => {
      el.addEventListener("change", persistBounds);
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          persistBounds();
          generateNumber();
        }
      });
    });

    // ── Fairness diagnostic ─────────────────────────────────
    const verifyBtn = document.getElementById("verify-btn");
    const diagOutput = document.getElementById("diag-output");

    function analyzeDistribution(values, min, max) {
      const counts = new Map();
      for (const v of values) {
        counts.set(v, (counts.get(v) || 0) + 1);
      }
      return counts;
    }

    function analyzeStreaks(values) {
      const streaks = {};
      let i = 0;
      while (i < values.length) {
        let len = 1;
        while (i + len < values.length && values[i + len] === values[i]) {
          len++;
        }
        if (len >= 2) streaks[len] = (streaks[len] || 0) + 1;
        i += len;
      }
      return streaks;
    }

    verifyBtn.addEventListener("click", () => {
      const error = validateBounds();
      if (error) { numError.textContent = error; return; }

      const min = parseInt(minInput.value, 10);
      const max = parseInt(maxInput.value, 10);
      const range = max - min + 1;
      const N = 100_000;

      verifyBtn.disabled = true;
      verifyBtn.textContent = "Running " + N.toLocaleString() + " iterations...";
      diagOutput.classList.remove("visible");

      setTimeout(() => {
        const start = performance.now();
        const values = new Array(N);
        for (let j = 0; j < N; j++) values[j] = secureRandomInt(min, max);
        const elapsed = ((performance.now() - start) / 1000).toFixed(2);

        const counts = analyzeDistribution(values, min, max);
        const expected = N / range;
        const lines = [];

        if (range <= 20) {
          lines.push("Distribution:");
          for (let v = min; v <= max; v++) {
            const c = counts.get(v) || 0;
            const pct = (c / N * 100).toFixed(3);
            const delta = ((c - expected) / expected * 100).toFixed(2);
            lines.push("  " + v + ": " + c.toLocaleString() + " (" + pct + "%) " + delta + "%");
          }
        } else {
          lines.push("Distribution: " + range + " values, expected ~" + expected.toFixed(0) + " each");
        }

        const streaks = analyzeStreaks(values);
        lines.push("\nStreak lengths (observed vs expected):");
        const pSame = 1 / range;
        const windows = N - 1;
        for (let len = 2; len <= 8; len++) {
          const obs = streaks[len] || 0;
          const expStreak = windows * Math.pow(pSame, len - 1) * (1 - pSame);
          if (expStreak < 0.5 && obs === 0) continue;
          lines.push("  Len " + len + ": " + obs.toLocaleString() + " (expected ~" + expStreak.toFixed(1) + ")");
        }

        lines.push("\nGenerated: " + N.toLocaleString() + " values in " + elapsed + "s");
        lines.push("Source: crypto.getRandomValues() — your browser CSPRNG");

        diagOutput.textContent = lines.join("\n");
        diagOutput.classList.add("visible");
        verifyBtn.disabled = false;
        verifyBtn.textContent = "🔬 Verify Fairness (browser CSPRNG)";
      }, 50);
    });

    // ── Coin toss ───────────────────────────────────────────
    let coinStats = { heads: 0, tails: 0 };

    function updateCoinStats() {
      headsCount.textContent = coinStats.heads;
      tailsCount.textContent = coinStats.tails;
      tossTotal.textContent = coinStats.heads + coinStats.tails;
    }

    function tossCoin() {
      coinDisplay.classList.remove("spinning");
      void coinDisplay.offsetWidth;
      coinDisplay.classList.add("spinning");
      coinResultText.textContent = "";
      coinResultText.className = "coin-result";

      const isHeads = secureRandomBoolean();
      setTimeout(() => {
        coinDisplay.textContent = isHeads ? "H" : "T";
        coinDisplay.style.background = isHeads
          ? "linear-gradient(135deg, #f5d76e, #e6b800)"
          : "linear-gradient(135deg, #c0c0d0, #8888a0)";
        coinDisplay.style.color = isHeads ? "#8b7300" : "#2a2a3a";
        coinResultText.textContent = isHeads ? "Heads" : "Tails";
        coinResultText.className = `coin-result ${isHeads ? "heads" : "tails"}`;
        coinResultText.classList.add("pop");

        coinStats[isHeads ? "heads" : "tails"]++;
        updateCoinStats();
        saveCoinStats();
      }, 400);
    }

    function saveCoinStats() {
      savePrefs({ ...loadPrefs(), coinStats });
    }

    function loadCoinStats() {
      const prefs = loadPrefs();
      if (prefs.coinStats) {
        coinStats = { ...prefs.coinStats };
        updateCoinStats();
      }
    }

    tossBtn.addEventListener("click", tossCoin);

    resetCoinStats.addEventListener("click", () => {
      coinStats = { heads: 0, tails: 0 };
      updateCoinStats();
      saveCoinStats();
      coinDisplay.textContent = "?";
      coinResultText.textContent = "";
      coinDisplay.style.background = "linear-gradient(135deg, #f5d76e, #e6b800)";
      coinDisplay.style.color = "#8b7300";
    });

    // ── Init ────────────────────────────────────────────────
    function init() {
      const prefs = loadPrefs();
      if (typeof prefs.min === "number") minInput.value = prefs.min;
      if (typeof prefs.max === "number") maxInput.value = prefs.max;
      if (prefs.coinStats) {
        coinStats = { ...prefs.coinStats };
        updateCoinStats();
      }
    }
    init();
  </script>
</body>
</html>
