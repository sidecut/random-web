      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 16px;
        padding-top: max(40px, 10vh);
      }

      .app {
        width: 100%;
        max-width: 480px;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }
      .header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .header p {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 4px;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .tab-btn {
        flex: 1;
        padding: 10px 0;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tab-btn.active {
        background: var(--surface-hover);
        color: var(--text);
        border-color: var(--accent);
        box-shadow: 0 0 12px var(--accent-glow);
      }
      .tab-btn:hover:not(.active) {
        color: var(--text);
      }

      /* Card */
      .card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 24px;
      }

      /* Panels */
      .tab-panel {
        /* visibility controlled by Alpine x-show */
      }
      .tab-panel.active {
        display: block;
      }

      /* Fields */
      .fields {
        display: flex;
        gap: 12px;
        margin-bottom: 8px;
      }
      .field {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .field label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
      }
      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius-sm);
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.95rem;
        transition: border-color 0.2s;
      }
      .field input:focus {
        outline: none;
        border-color: var(--accent);
      }

      /* Buttons */
      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 12px;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        filter: brightness(1.1);
        box-shadow: 0 4px 16px var(--accent-glow);
      }
      .btn-secondary {
        background: var(--surface-hover);
        color: var(--text);
        border: 1px solid #2a2a3a;
      }
      .btn-secondary:hover {
        border-color: var(--accent);
      }
      .btn:active {
        transform: scale(0.98);
      }

      /* Result display */
      .result-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        min-height: 80px;
        justify-content: center;
      }
      .numbers-result-area {
        margin-top: 16px;
      }
      .result-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
      }
      .result-value {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        transition: transform 0.15s ease;
      }
      .result-value.pop {
        animation: pop 0.35s ease-out;
      }
      .result-value.shuffle {
        font-size: 2rem;
        line-height: 1.3;
        word-break: break-all;
      }
      .result-range {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-family: var(--font-mono);
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .copy-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .copy-btn.copied {
        color: var(--success);
        border-color: var(--success);
      }
      .copy-btn:disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }
      @keyframes pop {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.15);
        }
        60% {
          transform: scale(0.95);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Coin */
      .coin-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 160px;
      }
      .coin {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f5d76e, #e6b800);
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: #8b7300;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 2px 4px rgba(255, 255, 255, 0.3);
        transition: transform 0.1s;
      }
      .coin.face-heads {
        background-image: var(--coin-heads);
        color: transparent;
      }
      .coin.face-tails {
        background-image: var(--coin-tails);
        color: transparent;
      }
      .coin.flip {
        animation: coin-flip 0.16s linear;
      }
      .coin-result {
        font-family: var(--font-mono);
        font-size: 2rem;
        font-weight: 700;
        margin-top: 12px;
        text-align: center;
        min-height: 40px;
      }
      .coin-result.heads {
        color: var(--accent);
      }
      .coin-result.tails {
        color: var(--danger);
      }

      @keyframes coin-flip {
        0% {
          transform: translateY(0) scaleY(1);
        }
        50% {
          transform: translateY(-26px) scaleY(0.08);
        }
        100% {
          transform: translateY(0) scaleY(1);
        }
      }

      /* Stats */
      .stats-row {
        display: flex;
        gap: 12px;
        text-align: center;
      }
      .stat {
        flex: 1;
        background: var(--bg);
        border-radius: var(--radius-sm);
        padding: 12px 8px;
      }
      .stat-value {
        font-family: var(--font-mono);
        font-size: 1.25rem;
        font-weight: 700;
      }
      .stat-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Reset button */
      .reset-link {
        background: none;
        border: none;
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.8rem;
        cursor: pointer;
        text-align: center;
        padding: 4px;
        transition: color 0.2s;
      }
      .reset-link:hover {
        color: var(--danger);
      }

      /* Error */
      .error-msg {
        color: var(--danger);
        font-size: 0.85rem;
        min-height: 20px;
      }

      /* Diagnostic */
      .diag-section {
        border-top: 1px solid #2a2a3a;
        padding-top: 16px;
        margin-top: 4px;
      }
      .diag-btn {
        width: 100%;
        padding: 10px;
        border: 1px solid #2a2a3a;
        border-radius: var(--radius-sm);
        background: var(--bg);
        color: var(--text-muted);
        font-family: var(--font);
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .diag-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .diag-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .diag-output {
        margin-top: 12px;
        background: var(--bg);
        border-radius: var(--radius-sm);
        padding: 14px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        line-height: 1.6;
        max-height: 300px;
        overflow-y: auto;
        display: none;
        white-space: pre-wrap;
      }
      .diag-output.visible {
        display: block;
      }

      /* Desktop */
      @media (min-width: 540px) {
        body {
          padding: 32px;
          padding-top: max(64px, 12vh);
        }
        .header h1 {
          font-size: 2rem;
        }
        .card {
          padding: 32px;
        }
        .fields {
          flex-wrap: nowrap;
        }
        .coin {
          width: 140px;
          height: 140px;
          font-size: 2.5rem;
        }
        .result-value {
          font-size: 5rem;
        }
        .result-value.shuffle {
          font-size: 2.5rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .result-value.pop,
        .coin.flip {
          animation: none;
        }
      }
    </style>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div class="app" x-data="app">
      <header class="header">
        <h1>Random Web</h1>
        <p>Cryptographically secure randomness in your browser</p>
      </header>

      <nav class="tabs">
        <button
          class="tab-btn"
          :class="{ active: activeTab === 'numbers' }"
          @click="switchTab('numbers')"
        >
          🎲 Numbers
        </button>
        <button
          class="tab-btn"
          :class="{ active: activeTab === 'coin' }"
          @click="switchTab('coin')"
        >
          🪙 Coin Toss
        </button>
      </nav>

      <!-- Numbers panel -->
      <div class="card">
        <div
          class="tab-panel"
          x-data="numbersPanel"
          :class="{ active: activeTab === 'numbers' }"
          x-show="activeTab === 'numbers'"
        >
          <div class="fields">
            <div class="field">
              <label for="min">Min</label>
              <input
                type="number"
                id="min"
                x-model.number="min"
                min="0"
                max="1000000"
                inputmode="numeric"
                @change="persistBounds"
                @keydown.enter.prevent="persistBounds(); generateNumber()"
              />
            </div>
            <div class="field">
              <label for="max">Max</label>
              <input
                type="number"
                id="max"
                x-model.number="max"
                min="1"
                max="1000000"
                inputmode="numeric"
                @change="persistBounds"
                @keydown.enter.prevent="persistBounds(); generateNumber()"
              />
            </div>
          </div>

          <div class="error-msg" x-show="error" x-text="error"></div>

          <button class="btn btn-primary" @click="generateNumber">
            Generate Number
          </button>

          <button class="btn btn-secondary" @click="shuffleRange">
            🔀 Shuffle Range
          </button>

          <div class="result-area numbers-result-area">
            <span class="result-label">Last result</span>
            <button
              class="copy-btn"
              :class="copyBtnClass"
              :disabled="!hasResult"
              @click="copy"
              x-text="copyBtnLabel"
            ></button>
            <span
              class="result-value"
              :class="{ pop: showPop, shuffle: showShuffle }"
              x-text="lastResult"
            ></span>
            <span class="result-range" x-text="resultRange"></span>
          </div>

          <div class="diag-section">
            <button
              class="diag-btn"
              :disabled="diagRunning"
              @click="runDiagnostic"
              x-text="diagBtnLabel"
            ></button>
            <div
              class="diag-output"
              :class="{ visible: showDiag }"
              x-text="diagText"
            ></div>
          </div>
        </div>

        <!-- Coin panel -->
        <div
          class="tab-panel"
          x-data="coinPanel"
          :class="{ active: activeTab === 'coin' }"
          x-show="activeTab === 'coin'"
        >
          <button class="btn btn-primary" @click="tossCoin">Toss Coin</button>

          <div class="coin-container">
            <div class="coin" x-ref="coinDisplay">?</div>
          </div>
          <div
            class="coin-result"
            :class="coinResultClass"
            x-text="coinResultText"
          ></div>

          <div class="stats-row">
            <div class="stat">
              <div class="stat-value" x-text="coinStats.heads"></div>
              <div class="stat-label">Heads</div>
            </div>
            <div class="stat">
              <div class="stat-value" x-text="coinStats.tails"></div>
              <div class="stat-label">Tails</div>
            </div>
            <div class="stat">
              <div
                class="stat-value"
                x-text="coinStats.heads + coinStats.tails"
              ></div>
              <div class="stat-label">Total</div>
            </div>
          </div>

          <button class="reset-link" @click="resetCoinStats">
            Clear stats
          </button>
        </div>
      </div>
    </div>

    <script>
      // ── CSPRNG ──────────────────────────────────────────────
      function secureRandomInt(min, max) {
        if (min > max) throw new RangeError("min must be <= max");
        const range = max - min + 1;
        const maxUint32 = 0xffffffff;
        const maxValid = maxUint32 - (maxUint32 % range);
        const buf = new Uint32Array(1);
        let val;
        do {
          crypto.getRandomValues(buf);
          val = buf[0];
        } while (val >= maxValid);
        return min + (val % range);
      }

      function secureRandomBoolean() {
        const buf = new Uint8Array(1);
        crypto.getRandomValues(buf);
        return (buf[0] & 1) === 0;
      }

      // ── localStorage helpers ────────────────────────────────
      const LS_KEY = "random-web-prefs";
      const PREF_DEFAULTS = {
        min: 1,
        max: 100,
        tab: "numbers",
        coinStats: { heads: 0, tails: 0 },
      };
      function getPrefs() {
        let stored = {};
        try {
          const raw = localStorage.getItem(LS_KEY);
          if (raw) stored = JSON.parse(raw);
        } catch (_) {}
        return {
          min: typeof stored.min === "number" ? stored.min : PREF_DEFAULTS.min,
          max: typeof stored.max === "number" ? stored.max : PREF_DEFAULTS.max,
          tab: typeof stored.tab === "string" ? stored.tab : PREF_DEFAULTS.tab,
          coinStats:
            stored.coinStats && typeof stored.coinStats === "object"
              ? { ...PREF_DEFAULTS.coinStats, ...stored.coinStats }
              : { ...PREF_DEFAULTS.coinStats },
        };
      }
      function updatePrefs(patch) {
        try {
          const raw = localStorage.getItem(LS_KEY);
          const current = raw ? JSON.parse(raw) : {};
          localStorage.setItem(LS_KEY, JSON.stringify({ ...current, ...patch }));
        } catch (_) {}
      }

      // ── Fisher-Yates shuffle ────────────────────────────────
      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = secureRandomInt(0, i);
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ── Fairness analysis helpers ───────────────────────────
      function analyzeDistribution(values, min, max) {
        const counts = new Map();
        for (const v of values) {
          counts.set(v, (counts.get(v) || 0) + 1);
        }
        return counts;
      }

      function analyzeStreaks(values) {
        const streaks = {};
        let i = 0;
        while (i < values.length) {
          let len = 1;
          while (i + len < values.length && values[i + len] === values[i]) {
            len++;
          }
          if (len >= 2) streaks[len] = (streaks[len] || 0) + 1;
          i += len;
        }
        return streaks;
      }

      // ── Alpine component ────────────────────────────────────
      const FLIP_MS = 160;

      document.addEventListener("alpine:init", () => {
        Alpine.data("app", () => ({
          activeTab: "numbers",

          init() {
            const prefs = getPrefs();
            this.activeTab = prefs.tab;
            this.$watch("activeTab", () => this.persistTab());
          },

          switchTab(tab) {
            this.activeTab = tab;
          },

          persistTab() {
            updatePrefs({ tab: this.activeTab });
          },
        }));

        Alpine.data("numbersPanel", () => ({
          min: 1,
          max: 100,
          lastResult: "—",
          hasResult: false,
          error: "",
          showPop: false,
          showShuffle: false,
          resultRange: "",
          copyBtnLabel: "📋 Copy",
          copyBtnClass: "",
          diagRunning: false,
          diagBtnLabel: "🔬 Verify Fairness (browser CSPRNG)",
          showDiag: false,
          diagText: "",

          init() {
            const prefs = getPrefs();
            this.min = prefs.min;
            this.max = prefs.max;
            this.$watch("min", () => this.persistBounds());
            this.$watch("max", () => this.persistBounds());
          },

          // ── Validation ────────────────────────────────────
          validateBounds() {
            if (isNaN(this.min) || isNaN(this.max))
              return "Please enter numbers for both bounds.";
            if (this.min > this.max)
              return "Min must be less than or equal to Max.";
            if (this.max - this.min > 1_000_000)
              return "Range too large. Max difference is 1,000,000.";
            return null;
          },

          // ── Number generation ─────────────────────────────
          generateNumber() {
            const err = this.validateBounds();
            this.error = err || "";
            if (err) return;

            try {
              const result = secureRandomInt(this.min, this.max);
              this.lastResult = String(result);
              this.hasResult = true;
              this.resultRange = `${this.min} – ${this.max}`;
              this.error = "";
              // Trigger pop animation via flag reset
              this.showPop = false;
              this.showShuffle = false;
              this.$nextTick(() => {
                this.showPop = true;
              });
            } catch (e) {
              this.error = e.message;
            }
          },

          // ── Shuffle ───────────────────────────────────────
          shuffleRange() {
            const err = this.validateBounds();
            this.error = err || "";
            if (err) return;

            const range = this.max - this.min + 1;
            const values = new Array(range);
            for (let v = this.min; v <= this.max; v++) values[v - this.min] = v;

            const shuffled = shuffleArray(values);

            const DISPLAY_CAP = 1000;
            let display;
            if (shuffled.length <= DISPLAY_CAP) {
              display = shuffled.join(" ");
            } else {
              const head = shuffled.slice(0, 20);
              const tail = shuffled.slice(-20);
              display = head.join(" ") + " ... " + tail.join(" ");
            }

            this.lastResult = display;
            this.hasResult = true;
            this.showShuffle = true;
            this.resultRange = `${this.min} – ${this.max}  (${range.toLocaleString()} items)`;
            this.error = "";
            this.showPop = false;
            this.$nextTick(() => {
              this.showPop = true;
            });
          },

          // ── Persistence ───────────────────────────────────
          persistBounds() {
            updatePrefs({ min: this.min, max: this.max });
          },

          // ── Copy ──────────────────────────────────────────
          async copy() {
            const text = this.lastResult;
            if (!text || text === "—") return;
            try {
              await navigator.clipboard.writeText(text);
              this.copyBtnLabel = "✓ Copied!";
              this.copyBtnClass = "copied";
              setTimeout(() => {
                this.copyBtnLabel = "📋 Copy";
                this.copyBtnClass = "";
              }, 1500);
            } catch {
              this.copyBtnLabel = "⚠ Failed";
              setTimeout(() => {
                this.copyBtnLabel = "📋 Copy";
              }, 1500);
            }
          },

          // ── Diagnostic ────────────────────────────────────
          runDiagnostic() {
            const err = this.validateBounds();
            if (err) {
              this.error = err;
              return;
            }

            const N = 100_000;
            this.diagRunning = true;
            this.diagBtnLabel = `Running ${N.toLocaleString()} iterations...`;
            this.showDiag = false;

            setTimeout(() => {
              const start = performance.now();
              const values = new Array(N);
              for (let j = 0; j < N; j++)
                values[j] = secureRandomInt(this.min, this.max);
              const elapsed = ((performance.now() - start) / 1000).toFixed(2);

              const range = this.max - this.min + 1;
              const counts = analyzeDistribution(values, this.min, this.max);
              const expected = N / range;
              const lines = [];

              if (range <= 20) {
                lines.push("Distribution:");
                for (let v = this.min; v <= this.max; v++) {
                  const c = counts.get(v) || 0;
                  const pct = ((c / N) * 100).toFixed(3);
                  const delta = (((c - expected) / expected) * 100).toFixed(2);
                  lines.push(
                    `  ${v}: ${c.toLocaleString()} (${pct}%) ${delta}%`,
                  );
                }
              } else {
                lines.push(
                  `Distribution: ${range} values, expected ~${expected.toFixed(0)} each`,
                );
              }

              const streaks = analyzeStreaks(values);
              lines.push("\nStreak lengths (observed vs expected):");
              const pSame = 1 / range;
              const windows = N - 1;
              for (let len = 2; len <= 8; len++) {
                const obs = streaks[len] || 0;
                const expStreak =
                  windows * Math.pow(pSame, len - 1) * (1 - pSame);
                if (expStreak < 0.5 && obs === 0) continue;
                lines.push(
                  `  Len ${len}: ${obs.toLocaleString()} (expected ~${expStreak.toFixed(1)})`,
                );
              }

              lines.push(
                `\nGenerated: ${N.toLocaleString()} values in ${elapsed}s`,
              );
              lines.push(
                "Source: crypto.getRandomValues() — your browser CSPRNG",
              );

              this.diagText = lines.join("\n");
              this.showDiag = true;
              this.diagRunning = false;
              this.diagBtnLabel = "🔬 Verify Fairness (browser CSPRNG)";
            }, 50);
          },

        }));

        Alpine.data("coinPanel", () => ({
          coinStats: { heads: 0, tails: 0 },
          coinResultText: "",
          coinResultClass: "coin-result",
          coinFlipping: false,

          init() {
            const prefs = getPrefs();
            this.coinStats = { ...prefs.coinStats };
          },

          // ── Coin toss ─────────────────────────────────────
          showCoinFace(isHeads) {
            const el = this.$refs.coinDisplay;
            el.textContent = "";
            el.classList.toggle("face-heads", isHeads);
            el.classList.toggle("face-tails", !isHeads);
          },

          settleCoin(isHeads) {
            const el = this.$refs.coinDisplay;
            el.classList.remove("flip");
            this.coinResultText = isHeads ? "Heads" : "Tails";
            this.coinResultClass = `coin-result ${isHeads ? "heads" : "tails"}`;
            this.coinStats = {
              heads: this.coinStats.heads + (isHeads ? 1 : 0),
              tails: this.coinStats.tails + (isHeads ? 0 : 1),
            };
            this.saveCoinStats();
            this.coinFlipping = false;
          },

          tossCoin() {
            if (this.coinFlipping) return;
            this.coinResultText = "";
            this.coinResultClass = "coin-result";

            const isHeads = secureRandomBoolean();

            const reduceMotion =
              window.matchMedia &&
              window.matchMedia("(prefers-reduced-motion: reduce)").matches;
            if (reduceMotion) {
              this.showCoinFace(isHeads);
              this.settleCoin(isHeads);
              return;
            }

            let flips = 3 + Math.floor(Math.random() * 3);
            if ((flips % 2 === 0) !== isHeads) flips++;

            this.coinFlipping = true;
            let showingHeads = true;
            this.showCoinFace(showingHeads);

            const self = this;
            let done = 0;
            function doFlip() {
              const el = self.$refs.coinDisplay;
              el.classList.remove("flip");
              void el.offsetWidth;
              el.classList.add("flip");
              setTimeout(() => {
                showingHeads = !showingHeads;
                self.showCoinFace(showingHeads);
              }, FLIP_MS / 2);

              done++;
              if (done < flips) {
                setTimeout(doFlip, FLIP_MS);
              } else {
                setTimeout(() => self.settleCoin(isHeads), FLIP_MS);
              }
            }
            doFlip();
          },

          // ── Coin stats ────────────────────────────────────
          saveCoinStats() {
            updatePrefs({ coinStats: this.coinStats });
          },

          resetCoinStats() {
            this.coinStats = { heads: 0, tails: 0 };
            this.saveCoinStats();
            const el = this.$refs.coinDisplay;
            el.textContent = "?";
            el.classList.remove("face-heads", "face-tails");
            this.coinResultText = "";
            this.coinResultClass = "coin-result";
          },
        }));
      });

      // ── Service worker ─────────────────────────────────────
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
